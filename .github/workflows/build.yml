name: Build TV app
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode keystore
        run: echo "${{ secrets.OFD_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/ofd.keystore"

      - name: Build APK and AAB
        env:
          OFD_KEYSTORE: ${{ runner.temp }}/ofd.keystore
          OFD_KS_PASS: ${{ secrets.OFD_KS_PASS }}
          OFD_KEY_ALIAS: ${{ secrets.OFD_KEY_ALIAS }}
          OFD_KEY_PASS: ${{ secrets.OFD_KEY_PASS }}
        run: gradle :app:assembleRelease :app:bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: tv-app
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
